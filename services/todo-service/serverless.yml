service: todo-app

custom:
  tableName: TodosTable
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true
      seed: true
    seed:
      domain:
        sources:
          - table: ${self:custom.tableName}
            sources: [offline/seeds/tasks.json]
  esbuild:
    sourcemap: true
    minify: true
    target: node18
    platform: node
    watch:
      pattern:
        - "src/**/*.ts"

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  memorySize: 256
  timeout: 30
  environment:
    TABLE_NAME: ${self:custom.tableName}
    NODE_OPTIONS: "--enable-source-maps"
    AWS_ACCESS_KEY_ID: local
    AWS_SECRET_ACCESS_KEY: local
    AWS_REGION: us-east-1
    IS_OFFLINE: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${opt:region, self:provider.region}:*:table/${self:custom.tableName}"

# build:
#   esbuild: false

resources:
  Resources:
    TodosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

functions:
  createTodo:
    handler: src/handlers/createTodo.handler
    events:
      - http:
          path: todos
          method: post
          cors: true

  getTodos:
    handler: src/handlers/getTodos.handler
    events:
      - http:
          path: todos
          method: get
          cors: true

  getTodo:
    handler: src/handlers/getTodo.handler
    events:
      - http:
          path: todos/{id}
          method: get
          cors: true

  updateTodo:
    handler: src/handlers/updateTodo.handler
    events:
      - http:
          path: todos/{id}
          method: put
          cors: true

  deleteTodo:
    handler: src/handlers/deleteTodo.handler
    events:
      - http:
          path: todos/{id}
          method: delete
          cors: true

  searchTodos:
    handler: src/handlers/searchTodos.handler
    events:
      - http:
          path: todos/search
          method: get
          cors: true

plugins:
  - serverless-esbuild
  - serverless-dynamodb
  - serverless-offline

package:
  individually: true
